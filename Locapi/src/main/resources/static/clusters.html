<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clusters map</title>
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />
    <style>
        html, body { height: 100%; margin: 0; }
        #map { height: 100%; width: 100%; }
        .panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            background: rgba(255,255,255,0.92);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            max-width: 460px;
            line-height: 1.25;
        }
        .panel code { font-size: 12px; }
        .row { margin-top: 8px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        label { user-select: none; cursor: pointer; }
        .muted { color: #666; font-size: 12px; }
        .badge { font-size: 12px; color: #333; }

        .legend {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #444;
        }
        .grad {
            width: 140px;
            height: 10px;
            border-radius: 6px;
            background: linear-gradient(90deg, #d32f2f, #fbc02d, #2e7d32);
            border: 1px solid rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
<div id="map"></div>

<div class="panel">
    <div><b>Clusters + Quality</b></div>
    <div id="status">Loading…</div>

    <div class="row">
        <label><input type="checkbox" id="cbWifi" checked /> Wi‑Fi <span class="badge" id="cntWifi"></span></label>
        <label><input type="checkbox" id="cbCell" checked /> Cellular <span class="badge" id="cntCell"></span></label>
        <label><input type="checkbox" id="cbBt" checked /> Bluetooth <span class="badge" id="cntBt"></span></label>
        <label><input type="checkbox" id="cbQuality" checked /> Quality <span class="badge" id="cntQuality"></span></label>
    </div>

    <div class="legend">
        <span>0</span><div class="grad" title="quality 0..1"></div><span>1</span>
    </div>

    <div class="muted" style="margin-top:6px;">
        Clusters endpoint: <code id="endpointClusters"></code><br/>
        Quality endpoint: <code id="endpointQuality"></code>
    </div>
</div>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>

<script>
    const API_CLUSTERS = "/api/clusters";
    const API_QUALITY  = "/api/quality";

    document.getElementById("endpointClusters").textContent = API_CLUSTERS;
    document.getElementById("endpointQuality").textContent  = API_QUALITY;

    const map = L.map('map').setView([55.751244, 37.618423], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Слои
    const wifiLayer    = L.featureGroup().addTo(map);
    const cellLayer    = L.featureGroup().addTo(map);
    const btLayer      = L.featureGroup().addTo(map);
    const qualityLayer = L.featureGroup().addTo(map);

    const cbWifi = document.getElementById("cbWifi");
    const cbCell = document.getElementById("cbCell");
    const cbBt = document.getElementById("cbBt");
    const cbQuality = document.getElementById("cbQuality");

    function setLayerEnabled(layer, enabled) {
        if (enabled) {
            if (!map.hasLayer(layer)) layer.addTo(map);
        } else {
            if (map.hasLayer(layer)) map.removeLayer(layer);
        }
    }

    cbWifi.addEventListener("change", () => setLayerEnabled(wifiLayer, cbWifi.checked));
    cbCell.addEventListener("change", () => setLayerEnabled(cellLayer, cbCell.checked));
    cbBt.addEventListener("change", () => setLayerEnabled(btLayer, cbBt.checked));
    cbQuality.addEventListener("change", () => setLayerEnabled(qualityLayer, cbQuality.checked));

    function toNum(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
    }

    function detectType(c) {
        const t = String(c.type ?? "").toUpperCase();
        if (t === "WIFI" || t === "CELLULAR" || t === "BLUETOOTH") return t;

        const key = String(c.clusterKey ?? "");
        if (key.startsWith("WIFI")) return "WIFI";
        if (key.startsWith("CELLULAR")) return "CELLULAR";
        if (key.startsWith("BLUETOOTH")) return "BLUETOOTH";
        return "UNKNOWN";
    }

    function colorByType(type) {
        switch (type) {
            case "WIFI": return { stroke: "#1976d2", fill: "#1976d2" };
            case "CELLULAR": return { stroke: "#2e7d32", fill: "#2e7d32" };
            case "BLUETOOTH": return { stroke: "#6a1b9a", fill: "#6a1b9a" };
            default: return { stroke: "#555", fill: "#555" };
        }
    }

    // ----------------------------
    // Quality color scale (0..1)
    // ----------------------------
    function clamp01(x) { return Math.max(0, Math.min(1, x)); }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function hexToRgb(hex) {
        const h = hex.replace("#", "");
        return {
            r: parseInt(h.slice(0,2), 16),
            g: parseInt(h.slice(2,4), 16),
            b: parseInt(h.slice(4,6), 16),
        };
    }

    function rgbToHex({r,g,b}) {
        const toHex = (v) => v.toString(16).padStart(2, "0");
        return "#" + toHex(r) + toHex(g) + toHex(b);
    }

    // Красный -> Жёлтый -> Зелёный (более читаемо чем просто red->green)
    function colorFromQuality(q) {
        q = clamp01(Number(q) || 0);
        const red = hexToRgb("#d32f2f");
        const yel = hexToRgb("#fbc02d");
        const grn = hexToRgb("#2e7d32");

        let c;
        if (q <= 0.5) {
            const t = q / 0.5;
            c = { r: Math.round(lerp(red.r, yel.r, t)),
                g: Math.round(lerp(red.g, yel.g, t)),
                b: Math.round(lerp(red.b, yel.b, t)) };
        } else {
            const t = (q - 0.5) / 0.5;
            c = { r: Math.round(lerp(yel.r, grn.r, t)),
                g: Math.round(lerp(yel.g, grn.g, t)),
                b: Math.round(lerp(yel.b, grn.b, t)) };
        }
        return rgbToHex(c);
    }

    // ----------------------------
    // Geohash (encode + bbox decode)
    // ----------------------------
    const GH_BASE32 = "0123456789bcdefghjkmnpqrstuvwxyz";
    const GH_MAP = (() => {
        const m = new Map();
        for (let i = 0; i < GH_BASE32.length; i++) m.set(GH_BASE32[i], i);
        return m;
    })();

    // decode geohash -> bounding box
    function geohashBBox(hash) {
        if (!hash || typeof hash !== "string") return null;
        hash = hash.toLowerCase();

        let minLat = -90, maxLat = 90;
        let minLon = -180, maxLon = 180;

        let isEven = true;

        for (const ch of hash) {
            const cd = GH_MAP.get(ch);
            if (cd == null) return null;

            for (let mask = 16; mask >= 1; mask >>= 1) {
                const bit = (cd & mask) !== 0;

                if (isEven) {
                    const mid = (minLon + maxLon) / 2;
                    if (bit) minLon = mid; else maxLon = mid;
                } else {
                    const mid = (minLat + maxLat) / 2;
                    if (bit) minLat = mid; else maxLat = mid;
                }
                isEven = !isEven;
            }
        }

        return { minLat, maxLat, minLon, maxLon };
    }

    // encode lat/lon -> geohash (для popup/диагностики на точках)
    function geohashEncode(lat, lon, precision = 7) {
        lat = Number(lat); lon = Number(lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;

        let minLat = -90, maxLat = 90;
        let minLon = -180, maxLon = 180;

        let hash = "";
        let isEven = true;
        let bit = 0;
        let ch = 0;

        while (hash.length < precision) {
            if (isEven) {
                const mid = (minLon + maxLon) / 2;
                if (lon >= mid) { ch = (ch << 1) + 1; minLon = mid; }
                else { ch = (ch << 1) + 0; maxLon = mid; }
            } else {
                const mid = (minLat + maxLat) / 2;
                if (lat >= mid) { ch = (ch << 1) + 1; minLat = mid; }
                else { ch = (ch << 1) + 0; maxLat = mid; }
            }

            isEven = !isEven;

            if (++bit === 5) {
                hash += GH_BASE32[ch];
                bit = 0;
                ch = 0;
            }
        }

        return hash;
    }

    // ----------------------------
    // Loaders
    // ----------------------------
    async function fetchJson(url) {
        const resp = await fetch(url, { method: "GET" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
        return resp.json();
    }

    async function loadClusters() {
        const clusters = await fetchJson(API_CLUSTERS);
        if (!Array.isArray(clusters)) throw new Error("Clusters response is not an array");

        wifiLayer.clearLayers();
        cellLayer.clearLayers();
        btLayer.clearLayers();

        let renderedWifi = 0, renderedCell = 0, renderedBt = 0, skipped = 0;

        for (const c of clusters) {
            const lat = toNum(c.lat ?? c.latitude ?? c.centerLat);
            const lon = toNum(c.lon ?? c.longitude ?? c.centerLon);
            const radius = toNum(c.radiusMeters ?? c.radius_m ?? c.radius);
            if (lat == null || lon == null || radius == null) { skipped++; continue; }

            const type = detectType(c);
            const col = colorByType(type);

            const circle = L.circle([lat, lon], {
                radius: radius,
                color: col.stroke,
                weight: 1,
                opacity: 0.75,
                fillColor: col.fill,
                fillOpacity: 0.18
            });

            const title = c.name ?? c.clusterKey ?? c.id ?? "cluster";
            const gh = c.geohash ?? geohashEncode(lat, lon, 7); // "высчитываем" геохеш для точки

            circle.bindPopup(
                `<b>${title}</b>` +
                `<br/>type: ${type}` +
                `<br/>radius: ${radius} m` +
                `<br/>lat: ${lat}` +
                `<br/>lon: ${lon}` +
                `<br/>geohash: ${gh ?? "(n/a)"}`
            );

            if (type === "WIFI") { circle.addTo(wifiLayer); renderedWifi++; }
            else if (type === "CELLULAR") { circle.addTo(cellLayer); renderedCell++; }
            else if (type === "BLUETOOTH") { circle.addTo(btLayer); renderedBt++; }
            else { circle.addTo(wifiLayer); skipped++; }
        }

        document.getElementById("cntWifi").textContent = `(${renderedWifi})`;
        document.getElementById("cntCell").textContent = `(${renderedCell})`;
        document.getElementById("cntBt").textContent   = `(${renderedBt})`;

        setLayerEnabled(wifiLayer, cbWifi.checked);
        setLayerEnabled(cellLayer, cbCell.checked);
        setLayerEnabled(btLayer, cbBt.checked);

        return { total: clusters.length, rendered: (renderedWifi + renderedCell + renderedBt), skipped };
    }

    async function loadQuality() {
        const items = await fetchJson(API_QUALITY);
        if (!Array.isArray(items)) throw new Error("Quality response is not an array");

        qualityLayer.clearLayers();

        // Если у тебя /api/quality возвращает историю (много записей на 1 geohash),
        // возьмём последнюю по updatedAt/createdAt (простая стратегия).
        const byGeohash = new Map();
        for (const q of items) {
            const gh = q.geohash;
            if (!gh) continue;
            const ts = Date.parse(q.updatedAt ?? q.createdAt ?? "") || 0;
            const prev = byGeohash.get(gh);
            const prevTs = prev ? (Date.parse(prev.updatedAt ?? prev.createdAt ?? "") || 0) : -1;
            if (!prev || ts >= prevTs) byGeohash.set(gh, q);
        }

        let rendered = 0, skipped = 0;
        for (const [gh, q] of byGeohash.entries()) {
            const bbox = geohashBBox(gh);
            if (!bbox) { skipped++; continue; }

            const quality = Number(q.quality);
            const fill = colorFromQuality(quality);

            const rect = L.rectangle(
                [[bbox.minLat, bbox.minLon], [bbox.maxLat, bbox.maxLon]],
                {
                    color: "#000000",
                    weight: 0.5,
                    opacity: 0.25,
                    fillColor: fill,
                    fillOpacity: 0.35
                }
            );

            rect.bindPopup(
                `<b>Quality cell</b>` +
                `<br/>geohash: ${gh}` +
                `<br/>quality: ${Number.isFinite(quality) ? quality.toFixed(3) : "n/a"}` +
                `<br/>updatedAt: ${q.updatedAt ?? q.createdAt ?? "n/a"}`
            );

            rect.addTo(qualityLayer);
            rendered++;
        }

        document.getElementById("cntQuality").textContent = `(${rendered})`;
        setLayerEnabled(qualityLayer, cbQuality.checked);

        return { total: items.length, rendered, skipped, unique: byGeohash.size };
    }

    async function loadAndRenderAll() {
        const statusEl = document.getElementById("status");
        statusEl.textContent = "Fetching clusters + quality…";

        try {
            const [cRes, qRes] = await Promise.all([loadClusters(), loadQuality()]);

            // bounds по всем слоям сразу
            const all = L.featureGroup([wifiLayer, cellLayer, btLayer, qualityLayer]);
            const bounds = all.getBounds();
            if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));

            statusEl.textContent =
                `Clusters: loaded ${cRes.total}, rendered ${cRes.rendered}, skipped ${cRes.skipped}. ` +
                `Quality: loaded ${qRes.total} (unique geohash ${qRes.unique}), rendered ${qRes.rendered}, skipped ${qRes.skipped}.`;
        } catch (e) {
            statusEl.textContent = "Error: " + (e?.message ?? e);
            console.error(e);
        }
    }

    loadAndRenderAll();
</script>
</body>
</html>
